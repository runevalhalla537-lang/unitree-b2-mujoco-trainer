xml_path: ../assets/b2/b2.xml

train:
  total_timesteps: 1500000
  n_steps: 2048
  batch_size: 256
  learning_rate: 0.00015
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.8

env:
  target_lin_vel: 0.0
  max_episode_steps: 2200
  frame_skip: 4
  action_scale: 0.08
  fall_height_threshold: 0.20
  ctrl_penalty_weight: 0.005
  smooth_penalty_weight: 0.008
  orient_penalty_weight: 1.8
  stand_pose_penalty_weight: 3.0
  alive_bonus: 1.0
  reset_noise_qpos: 0.0005
